version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: domainforge-postgres
    environment:
      POSTGRES_USER: domainforge
      POSTGRES_PASSWORD: domainforge
      POSTGRES_DB: domainforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: domainforge-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
